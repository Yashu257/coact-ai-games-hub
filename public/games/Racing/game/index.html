          <script>
      const apiUrl = "https://4bdeotpg41.execute-api.ap-south-1.amazonaws.com/prod";

            // ── COACT Hub score bridge ─────────────────────────────────────────
            async function _recordScore(gameId, score) {
                try {
                    const empName = localStorage.getItem('ai_hub_employee');
                    if (!empName) return;

                    const response = await fetch('http://localhost:3001/api/scores', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ employeeName: empName, gameId, score })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        console.log('[Hub] Saved to backend:', data);
                    } else {
                        console.warn('[Hub] Backend save failed');
                    }
                } catch (e) {
                    console.warn('[Hub] Backend score bridge error:', e);
                }
            }

            function _recordLocalScore(gameId, score) {
                try {
                    var empName = localStorage.getItem('ai_hub_employee');
                    if (!empName) return;
                    var empId = empName.trim().toLowerCase().replace(/\s+/g, '-');
                    var store = {};
                    try { store = JSON.parse(localStorage.getItem('ai_hub_scores') || '{}'); } catch(e) {}
                    if (!store[empId]) store[empId] = { name: empName, games: {} };
                    store[empId].name = empName;
                    if (!store[empId].games[gameId]) store[empId].games[gameId] = { best: 0, attempts: 0, history: [], totalScore: 0 };
                    var g = store[empId].games[gameId];
                    g.attempts++;
                    g.history.unshift(score);
                    if (g.history.length > 10) g.history.pop();
                    g.totalScore += score;
                    if (score > g.best) g.best = score;
                    localStorage.setItem('ai_hub_scores', JSON.stringify(store));
                    console.log('[Hub] Saved', score, 'pts for', empName, '→', gameId);
                    _recordScore(gameId, score);
                } catch(e) { console.warn('[Hub] Score bridge failed:', e.message); }
            }
            // ──────────────────────────────────────────────────────────────────

            // Define displayLeaderboard first so it's available everywhere
            function displayLeaderboard(data) {
                if (!data || !Array.isArray(data)) return;
                data = data.sort(function(a,b){
                    if(a.score === b.score) return b.updatedAt - a.updatedAt;
                    return b.score - a.score;
                });
                var html = '';
                data.forEach(function(ele, idx){
                    html += '<tr><th>' + (idx+1) + '</th><td>' + ele.username + '</td><td>' + ele.score + '</td></tr>';
                });
                document.querySelector('#leaderboard tbody').innerHTML = html;
            }

            // Fetch leaderboard using native fetch (no axios needed)
            fetch(apiUrl + '/leaderboard/23')
                .then(function(res){ return res.json(); })
                .then(function(data){ if(data && data.body) displayLeaderboard(data.body); })
                .catch(function(){ 
                    document.querySelector('#leaderboard tbody').innerHTML = '<tr><td colspan="3" style="text-align:center">Leaderboard unavailable</td></tr>';
                });

                                            player_centrifugal_force: 0.3,      //CENTRIFUGAL FORCE VALUE WHEN IN CURVE.
                                            
                                            /////////////SCORE SETTINGS
                                            points_per_seconds_remaining: 100, //Number of points gained per seconds remaining  
                                            
                                            /////////////GENERAL SETTINGS
                                            audio_enable_on_startup:false, //ENABLE/DISABLE AUDIO WHEN GAME STARTS 
                                            fullscreen:true,            //SET THIS TO FALSE IF YOU DON'T WANT TO SHOW FULLSCREEN BUTTON
                                            check_orientation:true     //SET TO FALSE IF YOU DON'T WANT TO SHOW ORIENTATION ALERT ON MOBILE DEVICES   
                                            
                                            
                                           });

                                           
                                           
                                           
                    $(oMain).on("start_session", function(evt) {
                            if(getParamValue('ctl-arcade') === "true"){
                                parent.__ctlArcadeStartSession();
                            }
                            //...ADD YOUR CODE HERE EVENTUALLY
                    });
                     
                    $(oMain).on("end_session", function(evt) {

                    $(oMain).on("restart_level", function(evt, iLevel) {

                           }

                    $(oMain).on("save_score", function(evt,iScore, szMode) {
                        console.log(iScore);
                        if(getParamValue('ctl-arcade') === "true"){
                            parent.__ctlArcadeSaveScore({score:iScore, mode: szMode});

                        _recordLocalScore('racing', iScore);

                    $(oMain).on("start_level", function(evt, iLevel) {

                    $(oMain).on("show_interlevel_ad", function(evt) {

                           }
                           //...ADD YOUR CODE HERE EVENTUALLY
                    });
                    
                    $(oMain).on("share_event", function(evt, iScore) {
                        console.log(iScore);
                           if(getParamValue('ctl-arcade') === "true"){
                               parent.__ctlArcadeShareEvent({   img: TEXT_SHARE_IMAGE,
                                                                title: TEXT_SHARE_TITLE,
                                                                msg: TEXT_SHARE_MSG1 + iScore + TEXT_SHARE_MSG2,
                                                                msg_share: TEXT_SHARE_SHARE1 + iScore + TEXT_SHARE_SHARE1});
                           }
                           //...ADD YOUR CODE HERE EVENTUALLY
                    });
					 
                    if(isIOS()){ 
                        setTimeout(function(){sizeHandler();},200); 
                    }else{ sizeHandler(); } 
                                         
           });

        </script>

        <div id="gesture-permission-prompt">
            <div class="gp-title">🎮 Hand Gesture Control</div>
            <div style="font-size:13px;line-height:1.7;color:#ddd;">
                <b style="color:#e8c84a;">How to play with hands:</b><br>
                👍 <b>Thumb only</b> = Accelerate<br>
                👆 <b>Thumb + Index finger</b> = Steer Right<br>
                🤟 <b>Thumb + Index + Middle</b> = Steer Left<br>
                ✊ <b>Fist</b> = Brake<br>
                👍👍 <b>Both thumbs up</b> = Nitro!
            </div>
            <div class="gp-hint">Keyboard arrow keys always work too.</div>
            <br>
            <button id="btn-enable-gesture">Enable Hand Control</button>
            <button id="btn-skip-gesture">Skip</button>
        </div>

        <script>
        // ── Virtual Steering Wheel bootstrap ────────────────────────────────
        (function () {

            function _startGestureSystem() {
                VirtualSteeringWheel.init();
                WheelInputAdapter.attach(GestureController);

                HandTrackingManager.on('hands', function(d) { GestureController.update(d); });

                GestureController.on('WHEEL_DATA',    function(d) { VirtualSteeringWheel.setAngle(d.angle); });
                GestureController.on('HANDS_VISIBLE', function(v) { if (v) VirtualSteeringWheel.show(); else VirtualSteeringWheel.hide(); });

                GestureController.on('ACCELERATE',      function() { VirtualSteeringWheel.setAccel(true);  });
                GestureController.on('STOP_ACCELERATE', function() { VirtualSteeringWheel.setAccel(false); });
                GestureController.on('BRAKE',           function() { VirtualSteeringWheel.setBrake(true);  });
                GestureController.on('STOP_BRAKE',      function() { VirtualSteeringWheel.setBrake(false); });
                GestureController.on('NITRO',           function() { VirtualSteeringWheel.setNitro(true);  setTimeout(function(){ VirtualSteeringWheel.setNitro(false); }, 1500); });
                GestureController.on('GESTURE_LABEL',   function(g) { VirtualSteeringWheel.setGesture(g); });

                HandTrackingManager.on('disabled', function() {
                    WheelInputAdapter.releaseAll();
                    VirtualSteeringWheel.hide();
                });

                HandTrackingManager.init();
            }

            // Buttons are already in DOM — attach directly (no DOMContentLoaded needed)
            var btnYes  = document.getElementById('btn-enable-gesture');
            var btnSkip = document.getElementById('btn-skip-gesture');
            var prompt  = document.getElementById('gesture-permission-prompt');

            btnYes.onclick = function() {
                prompt.style.display = 'none';
                _startGestureSystem();
            };
            btnSkip.onclick = function() {
                prompt.style.display = 'none';
            };

        })();
        </script>
